<!DOCTYPE html>
<html lang="en">
<head>
    <title>Pathfinding</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Pathfinding Visualizer</h1>
  <div id="grid"></div>
  <label for="algorithm">Choose an algorithm:</label>
  <select id="algorithm">
    <option value="BFS">Breadth-First Search</option>
    <option value="A*">A*</option>
  </select>

  <button id="start">Start</button>

  <button id="move_start">Move Start</button>
  <button id="move_end">Move End</button>
  <button id="change_width">Change Width</button>
  <button id="change_height">Change Height</button>

  <script src="script.js" defer></script>
</body>
